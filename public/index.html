<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager — Đăng nhập</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <h1>📋 Task Manager</h1>
    <p>Quản lý công việc nhóm hiệu quả</p>

    <div class="auth-tabs">
      <button class="tab-btn active" onclick="showTab('login')">Đăng nhập</button>
      <button class="tab-btn" onclick="showTab('register')">Đăng ký</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginTab">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Nhập username..." />
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="loginPassword" placeholder="Nhập mật khẩu..." />
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Đăng nhập</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerTab" class="hidden">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="Chỉ chữ cái và số..." />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="email@example.com" />
      </div>
      <div class="form-group">
        <label>Họ tên</label>
        <input type="text" id="regFullName" placeholder="Họ và tên..." />
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="regPassword" placeholder="Ít nhất 6 ký tự..." />
      </div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">Đăng ký</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  requireGuest();

  function showTab(tab) {
    document.getElementById('loginTab').classList.toggle('hidden', tab !== 'login');
    document.getElementById('registerTab').classList.toggle('hidden', tab !== 'register');
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
  }

  async function doLogin() {
    let username = document.getElementById('loginUsername').value.trim();
    let password = document.getElementById('loginPassword').value;
    if (!username || !password) { showToast('Vui lòng nhập đủ thông tin', 'error'); return; }
    try {
      let data = await api('POST', '/auth/login', { username, password });
      setToken(data.token);
      setUser(data.user);
      showToast('Đăng nhập thành công!');
      setTimeout(() => window.location.href = '/pages/dashboard.html', 500);
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  async function doRegister() {
    let username = document.getElementById('regUsername').value.trim();
    let email    = document.getElementById('regEmail').value.trim();
    let fullName = document.getElementById('regFullName').value.trim();
    let password = document.getElementById('regPassword').value;
    if (!username || !email || !password) { showToast('Vui lòng nhập đủ thông tin', 'error'); return; }
    try {
      let data = await api('POST', '/auth/register', { username, email, fullName, password });
      setToken(data.token);
      setUser(data.user);
      showToast('Đăng ký thành công!');
      setTimeout(() => window.location.href = '/pages/dashboard.html', 500);
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (!document.getElementById('loginTab').classList.contains('hidden')) doLogin();
      else doRegister();
    }
  });
</script>
</body>
</html>
