<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Thong bao — Task Manager</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="sidebarWrap"></div>
<div class="app-layout">
  <div class="main-content">
    <div class="page-header">
      <h1>🔔 Thong bao</h1>
      <button class="btn btn-outline btn-sm" onclick="markAllRead()">✓ Doc tat ca</button>
    </div>
    <div class="card" id="notifContainer">
      <p class="text-gray text-center" style="padding:24px;">Dang tai...</p>
    </div>
    <div style="display:flex;justify-content:center;gap:8px;margin-top:12px;" id="pagination"></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/js/layout.js"></script>
<script>
  if (!requireAuth()) throw new Error();
  renderSidebar('notifications');
  let socket = initSocket();
  let currentPage = 1;

  // Khi nhan notification moi qua socket → reload
  window.onNewNotification = function() { loadNotifications(); };

  async function loadNotifications() {
    try {
      let data = await api('GET', `/notifications?page=${currentPage}&limit=15`);
      let items = data.notifications || [];
      if (!items.length) {
        document.getElementById('notifContainer').innerHTML = `
          <div class="text-center" style="padding:40px;">
            <div style="font-size:48px;margin-bottom:12px;">🔕</div>
            <p class="text-gray">Chua co thong bao nao</p>
          </div>`;
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      let html = items.map(n => `
        <div style="display:flex;align-items:start;gap:14px;padding:16px;border-bottom:1px solid #f3f4f6;background:${n.is_read?'white':'#eef2ff'};cursor:pointer;"
             onclick="readAndGo(${n.id}, '${n.ref_type}', ${n.ref_id})">
          <div style="font-size:24px;flex-shrink:0;">${iconForType(n.type)}</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:${n.is_read?'400':'700'};color:#1f2937;">${n.title}</div>
            <div style="font-size:13px;color:#6b7280;margin-top:2px;">${n.message}</div>
            <div style="font-size:11px;color:#9ca3af;margin-top:4px;">${fmtDateTime(n.created_at)}</div>
          </div>
          ${!n.is_read ? '<div style="width:10px;height:10px;background:#4f46e5;border-radius:50%;flex-shrink:0;margin-top:4px;"></div>' : ''}
        </div>`).join('');

      document.getElementById('notifContainer').innerHTML = html;

      // Pagination
      let totalPages = Math.ceil(data.total / 15);
      document.getElementById('pagination').innerHTML = totalPages > 1 ? `
        <button class="btn btn-sm btn-outline" onclick="changePage(${currentPage-1})" ${currentPage<=1?'disabled':''}>←</button>
        <span style="padding:6px 12px;font-size:13px;">${currentPage} / ${totalPages}</span>
        <button class="btn btn-sm btn-outline" onclick="changePage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>→</button>` : '';

      loadUnreadCount();
    } catch(e) { showToast(e.message, 'error'); }
  }

  function iconForType(type) {
    let icons = { task_assigned:'🎯', task_status_changed:'🔄', new_comment:'💬', project_invited:'📁', system:'📢' };
    return icons[type] || '🔔';
  }

  async function readAndGo(id, refType, refId) {
    try { await api('PATCH', `/notifications/${id}/read`); } catch {}
    if (refType === 'task' && refId) { localStorage.setItem('openTaskId', refId); goto('tasks'); }
    else loadNotifications();
  }

  async function markAllRead() {
    try {
      await api('PATCH', '/notifications/read-all');
      showToast('Da doc tat ca thong bao!');
      loadNotifications();
    } catch(e) { showToast(e.message, 'error'); }
  }

  function changePage(p) { if (p < 1) return; currentPage = p; loadNotifications(); }

  loadNotifications();
</script>
</body>
</html>
