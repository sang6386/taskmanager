<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — Task Manager</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="sidebarWrap"></div>
<div class="app-layout">
  <div class="main-content">
    <div class="page-header">
      <h1>✅ Tasks</h1>
      <button class="btn btn-primary" onclick="openCreateTask()">+ Tạo Task</button>
    </div>

    <!-- Filters -->
    <div class="task-filters">
      <input class="search-input" type="text" id="searchInput" placeholder="🔍 Tìm kiếm..." oninput="loadTasks()">
      <select class="filter-select" id="filterStatus" onchange="loadTasks()">
        <option value="">-- Trạng thái --</option>
        <option value="todo">Todo</option>
        <option value="in_progress">Đang làm</option>
        <option value="review">Review</option>
        <option value="done">Hoàn thành</option>
      </select>
      <select class="filter-select" id="filterPriority" onchange="loadTasks()">
        <option value="">-- Ưu tiên --</option>
        <option value="low">Thấp</option>
        <option value="medium">Trung bình</option>
        <option value="high">Cao</option>
        <option value="urgent">Khẩn cấp</option>
      </select>
      <select class="filter-select" id="filterProject" onchange="loadTasks()">
        <option value="">-- Project --</option>
      </select>
      <select class="filter-select" id="sortBy" onchange="loadTasks()">
        <option value="created_at">Ngày tạo</option>
        <option value="deadline">Deadline</option>
        <option value="title">Tên</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="clearFilters()">✕ Xoá filter</button>
    </div>

    <div class="card">
      <table class="task-table">
        <thead>
          <tr>
            <th>Tiêu đề</th><th>Project</th><th>Trạng thái</th>
            <th>Ưu tiên</th><th>Người làm</th><th>Deadline</th><th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="taskTableBody"><tr><td colspan="7" class="text-gray text-center" style="padding:24px;">Đang tải...</td></tr></tbody>
      </table>
      <!-- Pagination -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;" id="pagination"></div>
    </div>
  </div>
</div>

<!-- Modal tạo/sửa task -->
<div class="modal-overlay hidden" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="taskModalTitle">Tạo Task</h2>
      <button class="modal-close" onclick="closeTaskModal()">✕</button>
    </div>
    <div class="form-group"><label>Tiêu đề *</label><input type="text" id="tTitle" placeholder="Tiêu đề task..."></div>
    <div class="form-group"><label>Mô tả</label><textarea id="tDesc" placeholder="Mô tả..."></textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group">
        <label>Project *</label>
        <select id="tProject"><option value="">-- Chọn project --</option></select>
      </div>
      <div class="form-group">
        <label>Ưu tiên</label>
        <select id="tPriority">
          <option value="low">Thấp</option>
          <option value="medium" selected>Trung bình</option>
          <option value="high">Cao</option>
          <option value="urgent">Khẩn cấp</option>
        </select>
      </div>
      <div class="form-group">
        <label>Trạng thái</label>
        <select id="tStatus">
          <option value="todo">Todo</option>
          <option value="in_progress">Đang làm</option>
          <option value="review">Review</option>
          <option value="done">Hoàn thành</option>
        </select>
      </div>
      <div class="form-group"><label>Deadline</label><input type="date" id="tDeadline"></div>
    </div>
    <div class="form-group"><label>Giao cho (User ID)</label><input type="number" id="tAssignee" placeholder="User ID..."></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeTaskModal()">Huỷ</button>
      <button class="btn btn-primary" onclick="saveTask()">Lưu</button>
    </div>
  </div>
</div>

<!-- Modal chi tiết task -->
<div class="modal-overlay hidden" id="taskDetailModal">
  <div class="modal" style="max-width:680px;">
    <div class="modal-header">
      <h2 id="detailTaskTitle">Chi tiết Task</h2>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div id="taskDetailBody"></div>

    <!-- Attachments -->
    <div style="margin-top:16px;">
      <h3 style="font-size:14px;font-weight:700;margin-bottom:8px;">📎 File đính kèm</h3>
      <div class="attach-list" id="attachList"></div>
      <div class="upload-area mt-8" onclick="document.getElementById('attachInput').click()">
        <input type="file" id="attachInput" onchange="uploadAttachment()" accept="image/*,.pdf,.doc,.docx">
        <p style="color:#6b7280;font-size:13px;">📎 Click để đính kèm file (ảnh, PDF, Word)</p>
      </div>
    </div>

    <!-- Comments -->
    <div style="margin-top:16px;">
      <h3 style="font-size:14px;font-weight:700;margin-bottom:8px;">💬 Bình luận</h3>
      <div class="comment-list" id="commentList"></div>
      <div class="comment-input-wrap">
        <input type="text" id="commentInput" placeholder="Nhập bình luận... (Enter để gửi)" onkeydown="if(event.key==='Enter')sendComment()">
        <button class="btn btn-primary btn-sm" onclick="sendComment()">Gửi</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeDetailModal()">Đóng</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/js/layout.js"></script>
<script>
  if (!requireAuth()) throw new Error();
  renderSidebar('tasks');
  let socket = initSocket();
  let user = getUser();
  let editingTaskId = null;
  let currentTaskId = null;
  let currentPage = 1;
  let projects = [];

  // Socket: nhận comment real-time
  window.onNewComment = function(comment) {
    if (currentTaskId && comment.task_id == currentTaskId) {
      appendComment(comment);
    }
  };

  // Socket: nhận task update real-time
  window.onTaskUpdated = function(task) {
    loadTasks(); // Reload bảng
  };

  window.onNewTask = function(task) {
    loadTasks();
    showToast(`Task mới: "${task.title}"`, 'info');
  };

  async function loadProjects() {
    try {
      let data = await api('GET', '/projects?limit=100');
      projects = data.projects || [];
      let selFilter = document.getElementById('filterProject');
      let selCreate = document.getElementById('tProject');
      projects.forEach(p => {
        selFilter.innerHTML += `<option value="${p.id}">${p.name}</option>`;
        selCreate.innerHTML += `<option value="${p.id}">${p.name}</option>`;
      });
      // Nếu có projectId từ localStorage
      let savedProject = localStorage.getItem('projectId');
      if (savedProject) {
        selFilter.value = savedProject;
        localStorage.removeItem('projectId');
      }
      loadTasks();
    } catch (e) {}
  }

  async function loadTasks() {
    let search   = document.getElementById('searchInput').value.trim();
    let status   = document.getElementById('filterStatus').value;
    let priority = document.getElementById('filterPriority').value;
    let projectId= document.getElementById('filterProject').value;
    let sort     = document.getElementById('sortBy').value;
    let params   = `?page=${currentPage}&limit=10&sort=${sort}`;
    if (search)    params += `&search=${encodeURIComponent(search)}`;
    if (status)    params += `&status=${status}`;
    if (priority)  params += `&priority=${priority}`;
    if (projectId) params += `&project_id=${projectId}`;

    try {
      let data = await api('GET', '/tasks' + params);
      let tasks = data.tasks || [];
      if (!tasks.length) {
        document.getElementById('taskTableBody').innerHTML = `<tr><td colspan="7" class="text-gray text-center" style="padding:24px;">Không có task nào</td></tr>`;
        document.getElementById('pagination').innerHTML = '';
        return;
      }
      document.getElementById('taskTableBody').innerHTML = tasks.map(t => `
        <tr>
          <td><strong style="cursor:pointer;color:#4f46e5;" onclick="openDetail(${t.id})">${t.title}</strong></td>
          <td style="font-size:13px;color:#6b7280;">${t.project_name||'—'}</td>
          <td>
            <select class="filter-select" style="border:none;background:transparent;font-size:12px;" onchange="quickStatus(${t.id},this.value)">
              ${['todo','in_progress','review','done'].map(s=>`<option value="${s}" ${t.status===s?'selected':''}>${{todo:'Todo',in_progress:'Đang làm',review:'Review',done:'Xong'}[s]}</option>`).join('')}
            </select>
          </td>
          <td>${priorityBadge(t.priority)}</td>
          <td style="font-size:13px;">${t.assignee_username||'—'}</td>
          <td style="font-size:13px;${t.deadline && new Date(t.deadline)<new Date() && t.status!=='done'?'color:#ef4444;font-weight:700;':''}">${fmtDate(t.deadline)}</td>
          <td style="display:flex;gap:6px;">
            <button class="btn btn-sm btn-outline" onclick="openDetail(${t.id})" title="Chi tiết">👁️</button>
            <button class="btn btn-sm btn-outline" onclick="openEditTask(${t.id})" title="Sửa">✏️</button>
            <button class="btn btn-sm btn-danger" onclick="deleteTask(${t.id})" title="Xoá">🗑️</button>
          </td>
        </tr>`).join('');

      // Pagination
      let total = data.total;
      let totalPages = Math.ceil(total / 10);
      document.getElementById('pagination').innerHTML = `
        <span class="text-gray">${total} tasks</span>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm btn-outline" onclick="changePage(${currentPage-1})" ${currentPage<=1?'disabled':''}>←</button>
          <span style="padding:6px 12px;font-size:13px;">${currentPage} / ${totalPages}</span>
          <button class="btn btn-sm btn-outline" onclick="changePage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>→</button>
        </div>`;
    } catch (e) { showToast(e.message, 'error'); }
  }

  function changePage(p) { if (p < 1) return; currentPage = p; loadTasks(); }

  function clearFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('filterPriority').value = '';
    document.getElementById('filterProject').value = '';
    currentPage = 1;
    loadTasks();
  }

  async function quickStatus(id, status) {
    try {
      await api('PATCH', `/tasks/${id}/status`, { status });
      showToast('Đã cập nhật trạng thái!');
    } catch (e) { showToast(e.message, 'error'); loadTasks(); }
  }

  function openCreateTask() {
    editingTaskId = null;
    document.getElementById('taskModalTitle').textContent = 'Tạo Task';
    ['tTitle','tDesc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('tPriority').value = 'medium';
    document.getElementById('tStatus').value   = 'todo';
    document.getElementById('tDeadline').value = '';
    document.getElementById('tAssignee').value = '';
    document.getElementById('taskModal').classList.remove('hidden');
  }

  async function openEditTask(id) {
    try {
      let t = await api('GET', `/tasks/${id}`);
      editingTaskId = id;
      document.getElementById('taskModalTitle').textContent = 'Sửa Task';
      document.getElementById('tTitle').value    = t.title;
      document.getElementById('tDesc').value     = t.description || '';
      document.getElementById('tProject').value  = t.project_id;
      document.getElementById('tPriority').value = t.priority;
      document.getElementById('tStatus').value   = t.status;
      document.getElementById('tDeadline').value = t.deadline ? t.deadline.split('T')[0] : '';
      document.getElementById('tAssignee').value = t.assignee_id || '';
      document.getElementById('taskModal').classList.remove('hidden');
    } catch (e) { showToast(e.message, 'error'); }
  }

  function closeTaskModal() { document.getElementById('taskModal').classList.add('hidden'); }

  async function saveTask() {
    let title      = document.getElementById('tTitle').value.trim();
    let description= document.getElementById('tDesc').value.trim();
    let project_id = parseInt(document.getElementById('tProject').value);
    let priority   = document.getElementById('tPriority').value;
    let status     = document.getElementById('tStatus').value;
    let deadline   = document.getElementById('tDeadline').value || null;
    let assignee_id= document.getElementById('tAssignee').value ? parseInt(document.getElementById('tAssignee').value) : null;

    if (!title) { showToast('Tiêu đề không được để trống', 'error'); return; }
    if (!project_id && !editingTaskId) { showToast('Chọn project', 'error'); return; }

    try {
      if (editingTaskId) {
        await api('PUT', `/tasks/${editingTaskId}`, { title, description, priority, status, deadline, assignee_id });
        showToast('Đã cập nhật task!');
      } else {
        await api('POST', '/tasks', { title, description, priority, project_id, deadline, assignee_id });
        showToast('Đã tạo task!');
      }
      closeTaskModal();
      loadTasks();
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function deleteTask(id) {
    if (!confirm('Xoá task này?')) return;
    try {
      await api('DELETE', `/tasks/${id}`);
      showToast('Đã xoá task!');
      loadTasks();
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ── CHI TIẾT TASK ──
  async function openDetail(id) {
    currentTaskId = id;
    try {
      let t = await api('GET', `/tasks/${id}`);

      // Join socket room của task để nhận comment real-time
      if (socket) socket.emit('join_task', id);

      document.getElementById('detailTaskTitle').textContent = t.title;
      document.getElementById('taskDetailBody').innerHTML = `
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
          ${statusBadge(t.status)} ${priorityBadge(t.priority)}
          <span class="badge badge-todo">📁 ${t.project_name}</span>
        </div>
        <p style="font-size:14px;color:#374151;margin-bottom:12px;">${t.description || 'Không có mô tả'}</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;color:#6b7280;">
          <div>👤 Tạo bởi: <strong>${t.creator_name || t.creator_username}</strong></div>
          <div>🎯 Giao cho: <strong>${t.assignee_name || t.assignee_username || 'Chưa giao'}</strong></div>
          <div>📅 Deadline: <strong>${fmtDate(t.deadline)}</strong></div>
          <div>✅ Hoàn thành: <strong>${fmtDate(t.completed_at)}</strong></div>
        </div>`;

      // Attachments
      let attachHtml = (t.attachments || []).map(a =>
        `<a class="attach-item" href="/api/v1/upload/${a.filename}" target="_blank">📎 ${a.originalname}</a>`
      ).join('') || '<p class="text-gray" style="font-size:13px;">Chưa có file đính kèm</p>';
      document.getElementById('attachList').innerHTML = attachHtml;

      // Comments
      document.getElementById('commentList').innerHTML = '';
      (t.comments || []).forEach(c => appendComment(c));

      document.getElementById('taskDetailModal').classList.remove('hidden');
    } catch (e) { showToast(e.message, 'error'); }
  }

  function closeDetailModal() {
    document.getElementById('taskDetailModal').classList.add('hidden');
    currentTaskId = null;
  }

  function appendComment(c) {
    let list = document.getElementById('commentList');
    if (!list) return;
    let me = getUser();
    let div = document.createElement('div');
    div.className = 'comment-item';
    div.innerHTML = `
      <div class="avatar" style="width:30px;height:30px;font-size:12px;flex-shrink:0;">${(c.fullName||c.username||'?')[0].toUpperCase()}</div>
      <div class="comment-body" style="flex:1;">
        <div class="comment-meta"><strong>${c.fullName || c.username}</strong> · ${fmtDateTime(c.created_at)}</div>
        <div class="comment-text">${c.content}</div>
        ${c.user_id === me.id ? `<button onclick="deleteComment(${c.id},this.closest('.comment-item'))" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:11px;margin-top:4px;">Xoá</button>` : ''}
      </div>`;
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
  }

  async function sendComment() {
    if (!currentTaskId) return;
    let input   = document.getElementById('commentInput');
    let content = input.value.trim();
    if (!content) return;
    try {
      let comment = await api('POST', `/tasks/${currentTaskId}/comments`, { content });
      input.value = '';
      // Socket sẽ tự append qua onNewComment nếu người khác gửi
      // Nhưng nếu chính mình gửi thì append luôn
      appendComment(comment);
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function deleteComment(id, el) {
    try {
      await api('DELETE', `/tasks/${currentTaskId}/comments/${id}`);
      el.remove();
      showToast('Đã xoá comment');
    } catch (e) { showToast(e.message, 'error'); }
  }

  // Upload file đính kèm - giống thầy
  async function uploadAttachment() {
    if (!currentTaskId) return;
    let file = document.getElementById('attachInput').files[0];
    if (!file) return;
    try {
      let formData = new FormData();
      formData.append('file', file);
      let result = await api('POST', `/tasks/${currentTaskId}/attachments`, formData, true);
      let list = document.getElementById('attachList');
      let a = document.createElement('a');
      a.className = 'attach-item';
      a.href = result.url;
      a.target = '_blank';
      a.textContent = '📎 ' + file.name;
      list.appendChild(a);
      showToast('Đã đính kèm file!');
    } catch (e) { showToast(e.message, 'error'); }
  }

  loadProjects();
</script>
</body>
</html>
